<!DOCTYPE html>
<html>
<head>
    <title>Books are Doors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>A world where books are the door to your imagination</h1>

    <h2>
        Click on the book that peaks your interest and learn a little
        about the door you're about to open
    </h2>

    <div class="container">

        <!-- Book 1 -->
        <div class="book">
            <img src="https://m.media-amazon.com/images/I/71O30usmWjL._AC_UF894,1000_QL80_.jpg"
                 onclick="show_details(0,this)">
            <div class="description_box"></div>
        </div>

        <!-- Book 2 -->
        <div class="book">
            <img src="https://i.ebayimg.com/images/g/nAcAAOSwd~RZXhq4/s-l400.jpg"
                 onclick="show_details(1,this)">
            <div class="description_box"></div>
        </div>

        <!-- Book 3 -->
        <div class="book">
            <img src="https://m.media-amazon.com/images/I/71a+n5pP9LL.jpg"
                 onclick="show_details(2,this)">
            <div class="description_box"></div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
