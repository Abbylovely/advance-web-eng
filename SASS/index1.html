<!DOCTYPE html>
<html>
<head>
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- TOP SECTION -->
    <div class="top">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" width="150px">
        <button class="button b1">Sign In</button>
    </div>

    <!-- CENTER SECTION -->
    <div class="center">
        <span>Unlimited movies, TV shows and more.</span>
        <h2>Watch anywhere. Cancel anytime.</h2>
        <button class="button">JOIN FREE FOR A MONTH</button>
    </div>

    <hr>

    <!-- TABLE SECTION -->
    <table>
        <tr>
            <td>
                <img src="https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif" width="100%">
            </td>
            <td class="center">
                <h1>Enjoy on your TV.</h1>
                <h3>Watch on smart TVs, PlayStation, Xbox, Chromecast and more.</h3>
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://media.giphy.com/media/3o7TKsQ8UQYf0sZfFK/giphy.gif" width="100%">
            </td>
            <td class="center">
                <h1>Download your shows.</h1>
                <h3>Save your favourites easily and always have something to watch.</h3>
            </td>
        </tr>
    </table>

</body>
</html>
